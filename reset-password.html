<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset — Petcarus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container {
      max-width: 440px;
      width: 100%;
      background: #fff;
      padding: 48px 32px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 15px; margin-bottom: 28px; }
    .hint {
      background: #f7f8fa;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }
    .open-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s;
    }
    .open-btn:hover { background: #3b65e0; }
    .fallback { display: none; margin-top: 12px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4f7cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <h1>Password Reset Complete</h1>
    <p class="subtitle">Your password has been updated successfully.</p>
    <div class="hint">
      Please return to the <strong>Petcarus</strong> app and sign in with your new password.
    </div>
    <a class="open-btn" id="openApp" href="#">Open Petcarus</a>
    <p class="fallback" id="fallback">If the app didn't open, please open it manually and sign in.</p>
  </div>
  <script>
    (function () {
      var deepLink = 'com.petcarus.app://auth/callback' + window.location.search + window.location.hash;
      var btn = document.getElementById('openApp');
      var fallback = document.getElementById('fallback');
      btn.href = deepLink;

      var timeout = setTimeout(function () {
        fallback.style.display = 'block';
      }, 2000);

      window.addEventListener('blur', function () {
        clearTimeout(timeout);
      });
    })();
  </script>
</body>
</html>
