<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Petcarus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container {
      max-width: 440px;
      width: 100%;
      background: #fff;
      padding: 48px 32px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 15px; margin-bottom: 28px; }
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus {
      border-color: #4f7cff;
    }
    .submit-btn {
      display: inline-block;
      width: 100%;
      margin-top: 8px;
      padding: 14px 32px;
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .submit-btn:hover { background: #3b65e0; }
    .submit-btn:disabled { background: #a0b4f0; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .message.error { display: block; background: #fef2f2; color: #dc2626; }
    .message.success { display: block; background: #f0fdf4; color: #16a34a; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
    .hint a { color: #4f7cff; text-decoration: none; }
    #successView { display: none; }
    #successView .open-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s;
    }
    #successView .open-btn:hover { background: #3b65e0; }
    .fallback { display: none; margin-top: 12px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div id="resetForm">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4f7cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1>Set New Password</h1>
      <p class="subtitle">Enter your new password below.</p>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" />
      </div>
      <button class="submit-btn" id="submitBtn" onclick="handleReset()">Reset Password</button>
      <div class="message" id="message"></div>
    </div>

    <div id="successView">
      <div class="icon" style="background:#e8f5e9;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#34a853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Password Reset Complete</h1>
      <p class="subtitle">Your password has been updated successfully.</p>
      <a class="open-btn" id="openApp" href="#">Open Petcarus</a>
      <p class="fallback" id="fallback">If the app didn't open, please open it manually and sign in.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPABASE_URL = 'https://wkugqrvplsocoralybzc.supabase.co';
      var SUPABASE_ANON_KEY = 'sb_publishable_OeQ3ilnslvfVQZBKKymfMQ__k-tAmzj';

      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');
      var type = params.get('type');

      if (!accessToken || type !== 'recovery') {
        document.getElementById('message').className = 'message error';
        document.getElementById('message').textContent = 'Invalid or expired reset link. Please request a new password reset.';
        return;
      }

      var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      window.handleReset = async function () {
        var newPassword = document.getElementById('newPassword').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var msgEl = document.getElementById('message');
        var btn = document.getElementById('submitBtn');

        msgEl.className = 'message';
        msgEl.textContent = '';

        if (!newPassword || newPassword.length < 6) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Password must be at least 6 characters.';
          return;
        }
        if (newPassword !== confirmPassword) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Passwords do not match.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
          var { data: sessionData, error: sessionError } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });

          if (sessionError) {
            msgEl.className = 'message error';
            msgEl.textContent = 'Invalid or expired link. Please request a new password reset.';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
            return;
          }

          var { error: updateError } = await supabaseClient.auth.updateUser({
            password: newPassword
          });

          if (updateError) {
            msgEl.className = 'message error';
            msgEl.textContent = updateError.message || 'Failed to update password.';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
            return;
          }

          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('successView').style.display = 'block';

          var deepLink = 'petcarus://auth/callback' + window.location.search + window.location.hash;
          var openBtn = document.getElementById('openApp');
          var fallback = document.getElementById('fallback');
          openBtn.href = deepLink;

          var timeout = setTimeout(function () {
            fallback.style.display = 'block';
          }, 2000);

          window.addEventListener('blur', function () {
            clearTimeout(timeout);
          });
        } catch (err) {
          msgEl.className = 'message error';
          msgEl.textContent = 'An unexpected error occurred. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      };
    })();
  </script>
</body>
</html>
