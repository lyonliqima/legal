<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petcarus — Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: #fff;
      padding: 48px 32px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    a.card {
      display: block;
      padding: 20px;
      margin-bottom: 12px;
      background: #f7f8fa;
      border-radius: 10px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 16px;
      font-weight: 600;
      transition: background .15s;
    }
    a.card:hover { background: #eef0f4; }
    a.card span { display: block; font-weight: 400; font-size: 13px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Petcarus</h1>
    <p class="subtitle">Legal Documents</p>
    <a class="card" href="/privacy-policy.html">
      Privacy Policy
      <span>Data collection, usage, and protection</span>
    </a>
    <a class="card" href="/terms-of-service.html">
      Terms of Service
      <span>Rules and guidelines for using Petcarus</span>
    </a>
  </div>
</body>
</html>
